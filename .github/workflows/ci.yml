name: Blockbite CI

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  # Job untuk Smart Contract Solana (Anchor)
  smart-contract:
    name: Anchor program
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: cargo-

      - name: Install native build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y pkg-config build-essential libudev-dev libssl-dev

      - name: Install Solana CLI
        run: |
          sh -c "$(curl -sSfL https://release.anza.xyz/stable/install)"
          echo "$HOME/.local/share/solana/install/active_release/bin" >> "$GITHUB_PATH"

      - name: Install Anchor CLI (avm 0.32.1)
        run: |
          cargo install --git https://github.com/solana-foundation/anchor avm --locked --force
          avm install 0.32.1
          avm use 0.32.1
          echo "$HOME/.avm/bin" >> "$GITHUB_PATH"
          anchor --version

      - name: Restore program keypair
        working-directory: ./blockbite
        # The program keypair is stored as a GitHub Secret (base58 array JSON).
        # CI always uses the same keypair so declare_id! and PROGRAM_ID always match.
        # To set: Settings → Secrets → ANCHOR_PROGRAM_KEYPAIR → paste contents of
        #         target/deploy/blockbite-keypair.json
        run: |
          mkdir -p ~/.config/solana target/deploy
          solana-keygen new --no-bip39-passphrase --silent --outfile ~/.config/solana/id.json
          if [ -n "${{ secrets.ANCHOR_PROGRAM_KEYPAIR }}" ]; then
            echo '${{ secrets.ANCHOR_PROGRAM_KEYPAIR }}' > target/deploy/blockbite-keypair.json
            echo "Using program keypair from secret"
          else
            # Fallback: generate ephemeral key — anchor keys sync will update declare_id!
            solana-keygen new --no-bip39-passphrase --silent \
              --outfile target/deploy/blockbite-keypair.json
            echo "No ANCHOR_PROGRAM_KEYPAIR secret found — using ephemeral key"
          fi

      - name: Sync program ID
        working-directory: ./blockbite
        # Updates declare_id! in lib.rs to match the keypair we just wrote.
        # This is safe because tests read PROGRAM_ID from IDL.address (not hardcoded).
        run: anchor keys sync

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'
          cache-dependency-path: ./blockbite/yarn.lock

      - name: Install Node dependencies
        working-directory: ./blockbite
        run: yarn install --frozen-lockfile

      - name: Build program
        working-directory: ./blockbite
        shell: bash
        run: |
          set +e
          anchor build 2>&1 | tee anchor-build.log
          status=${PIPESTATUS[0]}
          if [ "$status" -ne 0 ]; then
            message="$(tail -n 80 anchor-build.log | \
              sed ':a;N;$!ba;s/%/%25/g;s/\r/%0D/g;s/\n/%0A/g')"
            echo "::error title=Anchor build failed::$message"
            exit "$status"
          fi

      - name: Run tests
        working-directory: ./blockbite
        run: |
          # 1. Bersihkan ledger lama untuk mencegah corrupt state
          rm -rf .anchor/test-ledger test-ledger

          # 2. Start validator di background
          solana-test-validator --reset --quiet &

          # 3. Health check loop: Tunggu sampai validator benar-benar siap (max 120 detik)
          echo "⏳ Waiting for validator to start..."
          for i in $(seq 1 24); do
            if curl -s -X POST -H "Content-Type: application/json" -d '{"jsonrpc":"2.0","id":1,"method":"getHealth"}' http://localhost:8899 | grep -q "ok"; then
              echo "✅ Validator ready!"
              break
            fi
            echo "   Still waiting... ($i/24)"
            sleep 5
          done

          # 4. Deploy program ke local validator
          anchor deploy --provider.cluster localnet

          # 5. Jalankan test suite
          yarn run ts-mocha -p ./tsconfig.json -t 1000000 tests/**/*.ts


