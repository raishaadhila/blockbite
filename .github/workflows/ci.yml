name: BlockBite CI
on:
  push:
    branches: [main]
    paths:
      - 'blockbite/**'
  pull_request:
    branches: [main]
    paths:
      - 'blockbite/**'
jobs:
  build-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: blockbite
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Cache Solana Toolchain
        uses: actions/cache@v4
        with:
          path: ~/.local/share/solana/install
          key: solana-${{ runner.os }}-stable
      - name: Install Solana CLI
        run: |
          sh -c "$(curl -sSfL https://release.anza.xyz/stable/install)"
          echo "$HOME/.local/share/solana/install/active_release/bin" >> $GITHUB_PATH
      - name: Cache Cargo Registry & Build Artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-${{ runner.os }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            cargo-${{ runner.os }}-
      - name: Install Anchor CLI
        run: cargo install --git https://github.com/coral-xyz/anchor --tag v0.32.1 anchor-cli --locked
      - name: Cache Node Modules
        uses: actions/cache@v4
        with:
          path: blockbite/node_modules
          key: node-${{ runner.os }}-${{ hashFiles('blockbite/yarn.lock') }}
          restore-keys: |
            node-${{ runner.os }}-
      - name: Install Node Dependencies
        run: yarn install
      - name: Verify Toolchain
        run: |
          solana --version
          anchor --version
          node --version
      - name: Run Rust Unit Tests
        run: cargo test --package blockbite
      - name: Build Anchor Program
        run: anchor build
      - name: Run Anchor Integration Tests
        run: anchor test