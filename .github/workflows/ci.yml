name: Blockbite CI

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  smart-contract:
    name: Anchor program
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@1.91.0

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: cargo-${{ runner.os }}-rust-1.91.0-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: cargo-${{ runner.os }}-rust-1.91.0-

      - name: Install native build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y pkg-config build-essential libudev-dev libssl-dev

      - name: Install Solana CLI
        run: |
          sh -c "$(curl -sSfL https://release.anza.xyz/stable/install)"
          echo "$HOME/.local/share/solana/install/active_release/bin" >> "$GITHUB_PATH"

      - name: Install Anchor CLI 0.32.1 (pre-built)
        run: |
          curl -L https://github.com/coral-xyz/anchor/releases/download/v0.32.1/anchor-cli-x86_64-unknown-linux-gnu.tar.gz -o anchor.tar.gz
          tar -xzf anchor.tar.gz
          chmod +x anchor
          mv anchor $HOME/.cargo/bin/anchor
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
          anchor --version

      - name: Restore program keypair
        working-directory: ./blockbite
        run: |
          mkdir -p ~/.config/solana target/deploy
          solana-keygen new --no-bip39-passphrase --silent --outfile ~/.config/solana/id.json
          if [ -n "${{ secrets.ANCHOR_PROGRAM_KEYPAIR }}" ]; then
            echo '${{ secrets.ANCHOR_PROGRAM_KEYPAIR }}' > target/deploy/blockbite-keypair.json
            echo "Using program keypair from secret"
          else
            solana-keygen new --no-bip39-passphrase --silent \
              --outfile target/deploy/blockbite-keypair.json
            echo "No ANCHOR_PROGRAM_KEYPAIR secret — using ephemeral key"
          fi

      - name: Sync program ID
        working-directory: ./blockbite
        run: anchor keys sync

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'
          cache-dependency-path: ./blockbite/yarn.lock

      - name: Install Node dependencies
        working-directory: ./blockbite
        run: yarn install --frozen-lockfile

      - name: Build program
        working-directory: ./blockbite
        run: anchor build

      - name: Run Rust unit tests
        working-directory: ./blockbite
        run: cargo test --package blockbite

      - name: Run integration tests
        working-directory: ./blockbite
        env:
          ANCHOR_WALLET: /home/runner/.config/solana/id.json
          ANCHOR_PROVIDER_URL: http://127.0.0.1:8899
        run: |
          rm -rf .anchor/test-ledger
          mkdir -p .anchor
          solana-test-validator --reset --quiet --ledger .anchor/test-ledger --rpc-port 8899 &
          sleep 10
          solana airdrop 100 $(solana-keygen pubkey /home/runner/.config/solana/id.json) --url http://127.0.0.1:8899 || true
          anchor deploy --provider.cluster localnet --provider.wallet /home/runner/.config/solana/id.json
          yarn run ts-mocha -p ./tsconfig.json -t 1000000 "tests/**/*.ts"
