name: Blockbite CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smart-contract:
    name: Build & Test Anchor Program
    runs-on: ubuntu-latest
    env:
      CARGO_INCREMENTAL: 0
      CARGO_TERM_COLOR: always
      CARGO_TARGET_DIR: ${{ github.workspace }}/blockbite/target

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Rust 1.91.0 ───────────────────────────────────────────────────────
      # Minimum version matrix:
      #   edition2024 support       → Cargo >= 1.85.0
      #   avm v1.0.2 dependencies   → rustc >= 1.91.0 (cargo-platform, icu_*, etc)
      # 1.91.0 satisfies both constraints.
      - name: Install Rust 1.91.0
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.91.0"

      # ── 3. Cargo cache ───────────────────────────────────────────────────────
      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: blockbite

      # ── 4. Solana CLI v2.1.6 ─────────────────────────────────────────────────
      # Pinned to v2.1.6 — same version used by working CI reference.
      # v2.1.6 bundles Rust/Cargo that is compatible with our dependency tree.
      # Later versions (v2.1.21+) bundle Cargo 1.79.0 which cannot parse
      # edition2024 manifests (block-buffer 0.12.0, cpufeatures 0.3.0, etc).
      - name: Cache Solana CLI v2.1.6
        uses: actions/cache@v4
        id: solana-cache
        with:
          path: |
            ~/.cache/solana
            ~/.local/share/solana/install
          key: solana-${{ runner.os }}-2.1.6
          restore-keys: |
            solana-${{ runner.os }}-

      - name: Install Solana CLI v2.1.6
        if: steps.solana-cache.outputs.cache-hit != 'true'
        run: sh -c "$(curl -sSfL https://release.anza.xyz/v2.1.6/install)"

      - name: Ensure Solana dirs and wallet
        run: |
          echo "$HOME/.local/share/solana/install/active_release/bin" >> "$GITHUB_PATH"
          # cargo-build-sbf panics at startup if ~/.cache/solana does not exist
          # (it calls fs::read_dir(~/.cache/solana).unwrap() unconditionally)
          mkdir -p "$HOME/.cache/solana"
          mkdir -p "$HOME/.config/solana"
          SOLANA_BIN="$HOME/.local/share/solana/install/active_release/bin"
          if [ ! -f "$HOME/.config/solana/id.json" ]; then
            "$SOLANA_BIN/solana-keygen" new \
              --no-bip39-passphrase --silent -o "$HOME/.config/solana/id.json"
          fi
          "$SOLANA_BIN/solana" config set \
            --url http://127.0.0.1:8899 \
            --keypair "$HOME/.config/solana/id.json"

      # ── 5. Anchor CLI 0.32.1 via AVM ─────────────────────────────────────────
      # AVM (Anchor Version Manager) is the officially supported way to install
      # Anchor. Compiling anchor-cli directly from source also works but takes
      # ~8 minutes; AVM caches the binary and is faster on cache hit.
      - name: Cache Anchor CLI 1.0.0
        uses: actions/cache@v4
        id: anchor-cache
        with:
          path: |
            ~/.avm
            ~/.cargo/bin/avm
            ~/.cargo/bin/anchor
          key: anchor-avm-${{ runner.os }}-1.0.0

      - name: Install Anchor CLI 1.0.0 via AVM
        if: steps.anchor-cache.outputs.cache-hit != 'true'
        run: |
          cargo install --git https://github.com/coral-xyz/anchor \
            avm --locked --force
          avm install 1.0.0
          avm use 1.0.0

      - name: Ensure Anchor CLI is active
        run: |
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
          avm use 1.0.0
          anchor --version

      # ── 6. Node.js ───────────────────────────────────────────────────────────
      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "yarn"
          cache-dependency-path: blockbite/yarn.lock

      # ── 7. Node dependencies ─────────────────────────────────────────────────
      - name: Install Node dependencies
        working-directory: blockbite
        run: yarn install --frozen-lockfile

      # ── 8. Program keypair ───────────────────────────────────────────────────
      - name: Restore program keypair
        working-directory: blockbite
        run: |
          mkdir -p target/deploy
          if [ -n "${{ secrets.ANCHOR_PROGRAM_KEYPAIR }}" ]; then
            echo '${{ secrets.ANCHOR_PROGRAM_KEYPAIR }}' \
              > target/deploy/blockbite-keypair.json
            echo "Using program keypair from secret"
          else
            solana-keygen new --no-bip39-passphrase --silent \
              --outfile target/deploy/blockbite-keypair.json
            echo "No ANCHOR_PROGRAM_KEYPAIR — using ephemeral key"
          fi

      # ── 9. Sync program ID ────────────────────────────────────────────────────
      - name: Sync program ID
        working-directory: blockbite
        run: anchor keys sync

      # ── 10. Build ─────────────────────────────────────────────────────────────
      - name: Build Anchor program
        working-directory: blockbite
        run: anchor build

      # ── 11. Rust unit tests ───────────────────────────────────────────────────
      - name: Run Rust unit tests
        working-directory: blockbite
        run: cargo test --manifest-path programs/blockbite/Cargo.toml --package blockbite

      # ── 12. Surfpool (local validator for Anchor 1.0.0) ───────────────────────
      # Anchor 1.0.0 replaced solana-test-validator with surfpool.
      # Without it anchor test fails with:
      # "Failed to spawn `surfpool`: No such file or directory"
      - name: Cache Surfpool
        uses: actions/cache@v4
        id: surfpool-cache
        with:
          path: ~/.local/bin/surfpool
          key: surfpool-${{ runner.os }}-latest

      - name: Install Surfpool
        if: steps.surfpool-cache.outputs.cache-hit != 'true'
        run: |
          curl -sL https://run.surfpool.run/ | bash

      - name: Ensure Surfpool in PATH
        run: |
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          "$HOME/.local/bin/surfpool" --version

      # ── 13. Integration tests ─────────────────────────────────────────────────
      - name: Run integration tests
        working-directory: blockbite
        env:
          ANCHOR_WALLET: /home/runner/.config/solana/id.json
          ANCHOR_PROVIDER_URL: http://127.0.0.1:8899
        run: |
          anchor test --skip-build \
            --provider.cluster localnet \
            --provider.wallet /home/runner/.config/solana/id.json